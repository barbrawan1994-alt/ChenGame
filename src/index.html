<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="忍者大战：融合宝可梦伙伴、忍术修行、三国名将与阵营领地争夺的像素 RPG。">
    <meta name="theme-color" content="#101826">
    <meta property="og:title" content="忍者大战">
    <meta property="og:description" content="集结伙伴、修炼忍术、招募名将，推进阵营战线。">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23101826'/%3E%3Ccircle cx='32' cy='32' r='20' fill='%23d6aa4f'/%3E%3Cpath d='M32 10v44M10 32h44' stroke='%23101826' stroke-width='7' stroke-linecap='round'/%3E%3Ccircle cx='32' cy='32' r='7' fill='%23b65632'/%3E%3C/svg%3E">
    <title>忍者大战</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #070b12; }
        #splash-loader {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; background:
                radial-gradient(circle at 35% 20%, rgba(214,170,79,0.2), transparent 28%),
                radial-gradient(circle at 70% 75%, rgba(182,86,50,0.22), transparent 32%),
                linear-gradient(142deg, #070b12, #101826 55%, #1a1110);
            z-index: 99999; transition: opacity 0.5s;
        }
        #splash-loader .title { font-size: 34px; font-weight: 900; color: #f9e7c1; letter-spacing: 6px; margin-bottom: 8px; font-family: "Arial Black", "PingFang SC", sans-serif; text-shadow: 0 14px 42px rgba(182,86,50,0.45); }
        #splash-loader .sub { font-size: 12px; color: rgba(249,231,193,0.5); letter-spacing: 5px; margin-bottom: 26px; font-family: "PingFang SC", sans-serif; text-transform: uppercase; }
        #splash-loader .bar-wrap { width: 220px; height: 5px; background: rgba(255,255,255,0.08); border-radius: 999px; overflow: hidden; box-shadow: inset 0 0 0 1px rgba(214,170,79,0.12); }
        #splash-loader .bar { width: 30%; height: 100%; background: linear-gradient(90deg, #b65632, #d6aa4f, #f2c36b); border-radius: 999px; animation: splashLoad 1.5s ease-in-out infinite; }
        @keyframes splashLoad { 0%{width:10%;margin-left:0} 50%{width:60%;margin-left:20%} 100%{width:10%;margin-left:90%} }
    </style>
</head>
<body>
    <div id="splash-loader">
        <div class="title">忍者大战</div>
        <div class="sub">Shinobi legend</div>
        <div class="bar-wrap"><div class="bar"></div></div>
    </div>
    <div id="root"></div>
    <script>
        window.addEventListener('load', function() {
            setTimeout(function() {
                var s = document.getElementById('splash-loader');
                if (s) { s.style.opacity = '0'; setTimeout(function() { s.remove(); }, 500); }
            }, 300);
        });
    </script>
</body>
</html>
