<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="超级精灵：以精灵收集、属性克制、回合对战和队伍养成为核心的超大型像素 RPG。">
    <meta name="theme-color" content="#07152f">
    <meta property="og:title" content="超级精灵">
    <meta property="og:description" content="收集、进化、对战，打造你的冠军精灵队伍。">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 96 96'%3E%3Ccircle cx='48' cy='48' r='43' fill='%2307152f'/%3E%3Cpath d='M10 46a38 38 0 0 1 76 0H10Z' fill='%23ff3f67'/%3E%3Cpath d='M10 50a38 38 0 0 0 76 0H10Z' fill='%23f8fbff'/%3E%3Cpath d='M12 48h72' stroke='%2307152f' stroke-width='8' stroke-linecap='round'/%3E%3Ccircle cx='48' cy='48' r='17' fill='%2307152f'/%3E%3Ccircle cx='48' cy='48' r='10' fill='%238fd8ff'/%3E%3Cpath d='M48 12l4 12 12 4-12 4-4 12-4-12-12-4 12-4 4-12Z' fill='%23ffd54f'/%3E%3C/svg%3E">
    <title>超级精灵</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #07152f; }
        #splash-loader {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 22px; background:
                radial-gradient(circle at 35% 20%, rgba(143,216,255,0.22), transparent 28%),
                radial-gradient(circle at 70% 75%, rgba(34,197,94,0.18), transparent 32%),
                linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px),
                linear-gradient(180deg, rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(142deg, #07152f, #0c244f 55%, #061429);
            background-size: auto, auto, 76px 76px, 76px 76px, auto;
            z-index: 99999; transition: opacity 0.5s;
        }
        #splash-loader::before {
            content: ""; position: absolute; width: min(520px, 58vw); aspect-ratio: 1; border-radius: 50%;
            border: 1px dashed rgba(143,216,255,0.18); box-shadow: inset 0 0 90px rgba(143,216,255,0.06);
        }
        #splash-loader::after {
            content: ""; position: absolute; inset: auto 0 0; height: 34%; pointer-events: none;
            background:
                linear-gradient(162deg, transparent 0 42%, rgba(157,247,199,0.12) 43% 44%, transparent 45%),
                linear-gradient(18deg, rgba(7,76,82,0.5) 0 38%, transparent 39%),
                linear-gradient(342deg, rgba(8,43,78,0.45) 0 45%, transparent 46%);
        }
        #splash-loader .splash-card {
            position: relative; z-index: 1; width: min(680px, calc(100vw - 40px)); box-sizing: border-box;
            display: grid; justify-items: center; padding: 30px 28px 28px; border-radius: 8px;
            border: 1px solid rgba(177,232,255,0.18);
            background: linear-gradient(180deg, rgba(255,255,255,0.09), rgba(255,255,255,0.035)), rgba(5,19,42,0.7);
            box-shadow: 0 24px 70px rgba(0,0,0,0.34), inset 0 1px 0 rgba(255,255,255,0.12);
            backdrop-filter: blur(18px) saturate(1.16);
        }
        #splash-loader .title { font-size: clamp(32px, 5vw, 48px); font-weight: 900; color: transparent; letter-spacing: 6px; margin-bottom: 8px; font-family: "Arial Black", "PingFang SC", sans-serif; background: linear-gradient(90deg,#fff,#8fd8ff,#ffd54f,#9df7c7); -webkit-background-clip: text; background-clip: text; text-shadow: 0 14px 42px rgba(47,109,246,0.35); }
        #splash-loader .sub { display: flex; align-items: center; gap: 12px; font-size: 12px; color: rgba(248,251,255,0.62); letter-spacing: 5px; margin-bottom: 22px; font-family: "PingFang SC", sans-serif; text-transform: uppercase; }
        #splash-loader .version { letter-spacing: 1px; padding: 4px 8px; border-radius: 8px; color: #fff5c7; border: 1px solid rgba(255,213,79,0.25); background: rgba(255,213,79,0.08); }
        #splash-loader .feature-row { width: 100%; display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; margin-bottom: 22px; }
        #splash-loader .feature { min-width: 0; padding: 12px; border-radius: 8px; border: 1px solid rgba(177,232,255,0.13); background: rgba(255,255,255,0.055); color: rgba(232,243,255,0.62); font: 700 12px/1.4 "PingFang SC", sans-serif; text-align: left; }
        #splash-loader .feature strong { display: block; margin-bottom: 4px; color: #eef8ff; font-size: 13px; }
        #splash-loader .bar-wrap { width: min(360px, 82vw); height: 5px; background: rgba(255,255,255,0.08); border-radius: 999px; overflow: hidden; box-shadow: inset 0 0 0 1px rgba(143,216,255,0.16); }
        #splash-loader .bar { width: 30%; height: 100%; background: linear-gradient(90deg, #2f6df6, #22c55e, #ffd54f); border-radius: 999px; animation: splashLoad 1.5s ease-in-out infinite; }
        #splash-loader .status { margin-top: 12px; color: rgba(232,243,255,0.46); font: 800 11px/1 "PingFang SC", sans-serif; letter-spacing: 2px; }
        @media (max-width: 640px) {
            #splash-loader .splash-card { padding: 24px 18px; }
            #splash-loader .feature-row { grid-template-columns: 1fr; }
            #splash-loader .sub { flex-wrap: wrap; justify-content: center; letter-spacing: 3px; }
        }
        @keyframes splashLoad { 0%{width:10%;margin-left:0} 50%{width:60%;margin-left:20%} 100%{width:10%;margin-left:90%} }
    </style>
</head>
<body>
    <div id="splash-loader">
        <div class="splash-card">
            <div class="title">超级精灵</div>
            <div class="sub"><span>Super Spirit</span><span class="version">v13.0</span></div>
            <div class="feature-row">
                <div class="feature"><strong>伙伴培养</strong>收集、进化、配置你的冠军队伍</div>
                <div class="feature"><strong>属性对战</strong>克制、技能 PP 与回合节奏并重</div>
                <div class="feature"><strong>长期冒险</strong>图鉴、道馆、忍术与无限城同步推进</div>
            </div>
            <div class="bar-wrap"><div class="bar"></div></div>
            <div class="status">正在同步训练家档案</div>
        </div>
    </div>
    <div id="root"></div>
    <script>
        window.addEventListener('load', function() {
            setTimeout(function() {
                var s = document.getElementById('splash-loader');
                if (s) { s.style.opacity = '0'; setTimeout(function() { s.remove(); }, 500); }
            }, 300);
        });
    </script>
</body>
</html>
