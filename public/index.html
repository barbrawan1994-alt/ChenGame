<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon RPG Legends</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #0a0a1a; }
        #splash-loader {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; background: linear-gradient(135deg, #0a0a1a, #1a1a2e, #16213e);
            z-index: 99999; transition: opacity 0.5s;
        }
        #splash-loader .title { font-size: 28px; font-weight: 900; color: #fff; letter-spacing: 4px; margin-bottom: 8px; font-family: sans-serif; }
        #splash-loader .sub { font-size: 12px; color: rgba(255,255,255,0.4); letter-spacing: 2px; margin-bottom: 24px; font-family: sans-serif; }
        #splash-loader .bar-wrap { width: 200px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
        #splash-loader .bar { width: 30%; height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); border-radius: 2px; animation: splashLoad 1.5s ease-in-out infinite; }
        @keyframes splashLoad { 0%{width:10%;margin-left:0} 50%{width:60%;margin-left:20%} 100%{width:10%;margin-left:90%} }
    </style>
</head>
<body>
    <div id="splash-loader">
        <div class="title">🎮 Pokemon RPG</div>
        <div class="sub">LEGENDS</div>
        <div class="bar-wrap"><div class="bar"></div></div>
    </div>
    <div id="root"></div>
    <script>
        window.addEventListener('load', function() {
            setTimeout(function() {
                var s = document.getElementById('splash-loader');
                if (s) { s.style.opacity = '0'; setTimeout(function() { s.remove(); }, 500); }
            }, 300);
        });
    </script>
</body>
</html>
